server:
  port: 8082

spring:
  application:
    name: income-verification-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: income-verification-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/incomeverification}
    username: ${SPRING_DATASOURCE_USERNAME:credit_platform}
    password: ${SPRING_DATASOURCE_PASSWORD:credit_platform}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  kafka:
    topic:
      payroll-events: payroll.events
      income-verified: income.verified

management:
  endpoints:
    web:
      exposure:
        include: health,info
