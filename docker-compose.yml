version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: credit_platform
      POSTGRES_PASSWORD: credit_platform
      POSTGRES_MULTIPLE_DATABASES: incomeverification,decisions
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh

  ingestion-service:
    build: ./ingestion-service
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8081:8081"

  income-verification-service:
    build: ./income-verification-service
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incomeverification
      SPRING_DATASOURCE_USERNAME: credit_platform
      SPRING_DATASOURCE_PASSWORD: credit_platform
    ports:
      - "8082:8082"

  decision-service:
    build: ./decision-service
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/decisions
      SPRING_DATASOURCE_USERNAME: credit_platform
      SPRING_DATASOURCE_PASSWORD: credit_platform
    ports:
      - "8083:8083"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  credit-profile-service:
    build: ./credit-profile-service
    depends_on:
      - kafka
      - mongo
    environment:
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: credit-profile-service
      Kafka__IncomeVerifiedTopic: income.verified
      Mongo__ConnectionString: mongodb://mongo:27017
      Mongo__DatabaseName: creditprofile
      Mongo__CreditProfileCollection: credit_profiles
    ports:
      - "8084:8084"
